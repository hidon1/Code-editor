<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSphere - Shared</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
        }
        .status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            text-align: center;
            padding: 24px;
        }
        .status small { color: #a0a0cc; }
    </style>
</head>
<body>
    <div class="status" id="status">
        <h2>טוען קובץ משותף...</h2>
        <small>CodeSphere</small>
    </div>

    <script>
        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function chooseEntryFile(files) {
            const by = name => files.find(f => (f.name || '').toLowerCase() === name);
            return (
                by('index.html') ||
                files.find(f => /\.html?$/i.test(f.name || '')) ||
                by('main.html') ||
                by('app.html') ||
                files[0]
            );
        }

        function rewriteAssetLinks(html, blobMap) {
            return html.replace(/(src|href)=(["'])([^"']+)\2/gi, (full, attr, quote, url) => {
                if (!url || /^(https?:|data:|blob:|#|mailto:|tel:)/i.test(url)) return full;
                const clean = url.split('#')[0].split('?')[0].replace(/^\.\//, '').replace(/^\//, '');
                const blobUrl = blobMap.get(clean) || blobMap.get(clean.toLowerCase());
                if (!blobUrl) return full;
                return `${attr}=${quote}${blobUrl}${quote}`;
            });
        }

        function renderAsRawFile(file) {
            const name = file.name || 'file';
            const content = file.content || '';
            const lower = name.toLowerCase();

            if (/\.html?$/i.test(lower)) {
                document.open();
                document.write(content);
                document.close();
                return;
            }

            document.title = name;
            document.body.innerHTML = `<pre style="margin:0;padding:24px;white-space:pre-wrap;word-break:break-word;">${escapeHtml(content)}</pre>`;
        }

        function renderProject(files) {
            if (!files.length) throw new Error('הפרויקט ריק');

            const blobMap = new Map();
            files.forEach(file => {
                const fileName = (file.name || '').replace(/^\.\//, '').replace(/^\//, '');
                const type = /\.css$/i.test(fileName)
                    ? 'text/css'
                    : /\.js$/i.test(fileName)
                        ? 'application/javascript'
                        : /\.html?$/i.test(fileName)
                            ? 'text/html'
                            : 'text/plain';

                const blobUrl = URL.createObjectURL(new Blob([file.content || ''], { type }));
                blobMap.set(fileName, blobUrl);
                blobMap.set(fileName.toLowerCase(), blobUrl);
            });

            const entry = chooseEntryFile(files);
            if (!entry) throw new Error('לא נמצא קובץ ראשי');

            const entryName = (entry.name || '').toLowerCase();
            if (/\.html?$/i.test(entryName)) {
                const html = rewriteAssetLinks(entry.content || '', blobMap);
                document.open();
                document.write(html);
                document.close();
                return;
            }

            renderAsRawFile(entry);
        }

        function renderError(message) {
            const el = document.getElementById('status');
            if (!el) {
                document.body.innerHTML = `<div class="status"><h2>שגיאה</h2><small>${escapeHtml(message)}</small></div>`;
                return;
            }
            el.innerHTML = `<h2>שגיאה בטעינת שיתוף</h2><small>${escapeHtml(message)}</small>`;
        }

        (async function initSharedView() {
            const id = new URLSearchParams(location.search).get('id');
            if (!id) {
                renderError('לא נמצא מזהה שיתוף בכתובת');
                return;
            }

            try {
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js');
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');

                const app = initializeApp({
                    apiKey: 'AIzaSyCRT2Bgu1V4RAjhR5CiTSjAgkKJQmXh2vc',
                    authDomain: 'code-editor-4c979.firebaseapp.com',
                    projectId: 'code-editor-4c979',
                    storageBucket: 'code-editor-4c979.firebasestorage.app',
                    messagingSenderId: '309267976559',
                    appId: '1:309267976559:web:5af8aa2e56146cc276d89a'
                });

                const db = getFirestore(app);
                const snap = await getDoc(doc(db, 'codesphere_shares', id));
                if (!snap.exists()) {
                    renderError('הקישור לא נמצא או פג תוקף');
                    return;
                }

                const data = snap.data() || {};
                const files = Array.isArray(data.files) ? data.files : [];
                document.title = data.projectName || 'Shared file';

                if ((data.type || '').toLowerCase() === 'file') {
                    renderAsRawFile(files[0] || { name: 'file.txt', content: '' });
                } else {
                    renderProject(files);
                }
            } catch (error) {
                renderError(error?.message || 'שגיאה לא צפויה');
            }
        })();
    </script>
</body>
</html>
