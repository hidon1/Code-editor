<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSphere • יוצק SVG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --primary: #00f5ff;
            --dark: #0a0a0f;
            --gray: #1a1a23;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #111118 100%);
            color: #e0e0ff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.15);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00f5ff, #a78bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-left: auto;
            align-items: center;
        }
        
        button {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        button:hover {
            background: var(--primary);
            color: #0a0a0f;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px var(--primary);
        }
        
        .main {
            display: flex;
            height: 100vh;
            padding-top: 70px;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }
        
        .svg-canvas {
            background: #111118;
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 30px 70px -20px rgba(0, 245, 255, 0.3),
                        inset 0 0 80px rgba(0, 0, 0, 0.6);
            transition: all 0.4s ease;
        }
        
        .sidebar {
            width: 320px;
            background: var(--gray);
            border-left: 1px solid rgba(0, 245, 255, 0.15);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }
        
        .section {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .section h3 {
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .param {
            margin-bottom: 18px;
        }
        
        .param label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #aaa;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: #00f5ff;
        }
        
        .value {
            float: left;
            font-family: monospace;
            font-size: 13px;
            color: #00f5ff;
        }
        
        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .history-item {
            width: 68px;
            height: 68px;
            background: #1f1f2a;
            border: 2px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }
        
        .history-item:hover {
            border-color: var(--primary);
            transform: scale(1.08);
        }
        
        .footer {
            margin-top: auto;
            font-size: 12px;
            color: #555;
            text-align: center;
        }
        
        .generate-btn {
            width: 100%;
            background: linear-gradient(90deg, #00f5ff, #a78bff);
            color: #0a0a0f;
            font-weight: 700;
            font-size: 17px;
            padding: 16px;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 10px 40px -10px #00f5ff;
            transition: all 0.3s;
        }
        
        .generate-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px -10px #00f5ff;
        }
        
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00f5ff, #c4a1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }

        .toggle {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 9999px;
            padding: 4px;
            width: fit-content;
            margin: 0 auto 20px;
        }

        .toggle-btn {
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #0a0a0f;
            font-weight: 600;
        }

        .shape-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .shape-btn {
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .shape-btn:hover {
            background: rgba(0,245,255,0.15);
            border-color: var(--primary);
        }

        .shape-btn.active {
            background: var(--primary);
            color: #0a0a0f;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CodeSphere</div>
        <div class="controls">
            <button onclick="randomizeAll()">🎲 אקראי</button>
            <button onclick="copySVG()">📋 העתק SVG</button>
            <button onclick="downloadSVG()">⬇️ הורד</button>
        </div>
    </div>

    <div class="main">
        <!-- Canvas -->
        <div class="canvas-container" id="canvas-container">
            <svg id="main-svg" class="svg-canvas" width="620" height="620" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div>
                <div class="title">יוצק SVG</div>
                <div class="subtitle">מחולל וקטורים אקראיים מבוסס מסועים</div>
            </div>

            <div class="section">
                <h3>🎛️ פרמטרים</h3>
                
                <div class="param">
                    <label>מספר אלמנטים <span class="value" id="val-count">18</span></label>
                    <input type="range" id="count" min="4" max="42" value="18" oninput="updateValue(this); generateSVG()">
                </div>
                
                <div class="param">
                    <label>רמת סיבוך <span class="value" id="val-complexity">7</span></label>
                    <input type="range" id="complexity" min="3" max="14" value="7" oninput="updateValue(this); generateSVG()">
                </div>
                
                <div class="param">
                    <label>עוצמת עיוות <span class="value" id="val-distort">48</span></label>
                    <input type="range" id="distort" min="10" max="120" value="48" oninput="updateValue(this); generateSVG()">
                </div>
                
                <div class="param">
                    <label>זווית סיבוב <span class="value" id="val-rotate">0</span>°</label>
                    <input type="range" id="rotate" min="0" max="360" value="0" oninput="updateValue(this); generateSVG()">
                </div>
            </div>

            <div class="section">
                <h3>🌊 אפקט נע</h3>
                <div class="toggle" id="animation-toggle">
                    <div class="toggle-btn" onclick="toggleAnimation(0)">ללא</div>
                    <div class="toggle-btn active" onclick="toggleAnimation(1)">נע קל</div>
                    <div class="toggle-btn" onclick="toggleAnimation(2)">נע חזק</div>
                </div>
                <div class="param">
                    <label>מהירות תנועה <span class="value" id="val-speed">1.8</span>s</label>
                    <input type="range" id="speed" min="0.6" max="4" step="0.1" value="1.8" oninput="updateValue(this); updateAnimation()">
                </div>
            </div>

            <div class="section">
                <h3>🔷 צורות בסיסיות</h3>
                <div class="shape-tools">
                    <div class="shape-btn active" onclick="addBaseShape(0)">מעגל</div>
                    <div class="shape-btn" onclick="addBaseShape(1)">ריבוע</div>
                    <div class="shape-btn" onclick="addBaseShape(2)">משולש</div>
                    <div class="shape-btn" onclick="addBaseShape(3)">משושה</div>
                </div>
                <div style="margin-top:16px; font-size:13px; color:#777; text-align:center;">
                    לחץ על צורה → היא תתווסף למרכז<br>השכבה העליונה<br>
                    <span style="color:#00f5ff; font-size:12px;">ניתן להזיז ולסובב את הצורות</span>
                </div>
            </div>

            <div class="section">
                <h3>🎨 סגנון</h3>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button onclick="setTheme(0)" style="flex:1;background:#00f5ff;color:#000;font-size:13px;padding:10px 0;border-radius:12px;">צבעוני</button>
                    <button onclick="setTheme(1)" style="flex:1;background:#a78bff;color:#fff;font-size:13px;padding:10px 0;border-radius:12px;">סגול</button>
                    <button onclick="setTheme(2)" style="flex:1;background:#ff2e63;color:#fff;font-size:13px;padding:10px 0;border-radius:12px;">ורוד</button>
                    <button onclick="setTheme(3)" style="flex:1;background:#111;color:#fff;font-size:13px;padding:10px 0;border-radius:12px;">מונוכרום</button>
                </div>
            </div>

            <div class="section">
                <h3>📜 היסטוריה</h3>
                <div class="history" id="history"></div>
            </div>

            <button class="generate-btn" onclick="randomizeAll()">
                ✨ צור SVG חדש
            </button>

            <div class="footer">
                מחולל מסועים + צורות בסיסיות • CodeSphere 2025
            </div>
        </div>
    </div>

    <script>
        let currentSVGCode = '';
        let historySVGs = [];
        let currentTheme = 0;
        let animationLevel = 1;
        let currentSpeed = 1.8;
        let baseShapes = [];

        const themes = [
            { primary: '#00f5ff', accent: '#a78bff', bg: '#111118' },
            { primary: '#c4a1ff', accent: '#7b5eff', bg: '#1a1428' },
            { primary: '#ff2e63', accent: '#ff9ec2', bg: '#2a0f1a' },
            { primary: '#ddd', accent: '#888', bg: '#1a1a1a' }
        ];

        function randomBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function createRandomPath(complexity, distort) {
            let path = `M ${randomBetween(60, 560)} ${randomBetween(60, 560)}`;
            const steps = complexity + randomBetween(4, 9);
            
            for (let i = 0; i < steps; i++) {
                const x = randomBetween(40, 580);
                const y = randomBetween(40, 580);
                const cx1 = x + randomBetween(-distort*2.2, distort*2.2);
                const cy1 = y + randomBetween(-distort*2.2, distort*2.2);
                const cx2 = x + randomBetween(-distort*3.5, distort*3.5);
                const cy2 = y + randomBetween(-distort*3.5, distort*3.5);
                
                path += ` C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x} ${y}`;
            }
            path += ' Z';
            return path;
        }

        function getBaseShapePath(type) {
            switch(type) {
                case 0: // מעגל
                    return 'M 0,-38 C 21,-38 38,-21 38,0 C 38,21 21,38 0,38 C -21,38 -38,21 -38,0 C -38,-21 -21,-38 0,-38 Z';
                case 1: // ריבוע
                    return 'M -38,-38 L 38,-38 L 38,38 L -38,38 Z';
                case 2: // משולש
                    return 'M 0,-42 L 36,30 L -36,30 Z';
                case 3: // משושה
                    return 'M 0,-40 L 34.6,-20 L 34.6,20 L 0,40 L -34.6,20 L -34.6,-20 Z';
                default:
                    return 'M -30,-30 L 30,-30 L 30,30 L -30,30 Z';
            }
        }

        function generateSVG(keepAnimation = false) {
            const svg = document.getElementById('main-svg');
            const count = parseInt(document.getElementById('count').value);
            const complexity = parseInt(document.getElementById('complexity').value);
            const distort = parseInt(document.getElementById('distort').value);
            const rotate = parseInt(document.getElementById('rotate').value);
            const theme = themes[currentTheme];
            
            let elements = '';
            
            elements += `<defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="${theme.primary}" stroke-width="0.5" opacity="0.06"/>
                </pattern>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>`;
            
            elements += `<rect width="620" height="620" fill="${theme.bg}"/>
            <rect width="620" height="620" fill="url(#grid)"/>`;
            
            for (let i = 0; i < count; i++) {
                const opacity = (0.12 + Math.random() * 0.48).toFixed(3);
                const scale = 0.55 + Math.random() * 1.65;
                const x = randomBetween(70, 550);
                const y = randomBetween(70, 550);
                const hueShift = (i * 19 + randomBetween(-30,30)) % 360;
                const path = createRandomPath(complexity, distort);
                
                const color = currentTheme === 3 
                    ? `hsl(0, 0%, ${62 + i * 2.5}%)` 
                    : `hsl(${hueShift}, 92%, 66%)`;
                
                const delay = (i * 0.07).toFixed(2);
                const animDuration = (currentSpeed * (0.7 + Math.random() * 0.8)).toFixed(2);
                
                let animStyle = '';
                if (animationLevel > 0) {
                    const intensity = animationLevel === 1 ? 6 : 14;
                    animStyle = `animation: float${i%3} ${animDuration}s ease-in-out infinite ${delay}s;`;
                }
                
                const g = `
                <g transform="translate(${x} ${y}) rotate(${rotate + (i * 8 % 55)} 0 0) scale(${scale})" opacity="${opacity}" style="${animStyle}">
                    <path d="${path}" fill="${color}" stroke="${theme.primary}" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)"/>
                </g>`;
                
                elements += g;
            }
            
            // Decorative rings (ללא העיגול המרכזי)
            for (let i = 0; i < 6; i++) {
                const r = 92 + i * 48;
                const opacity = (0.07 + i * 0.025).toFixed(2);
                elements += `<circle cx="310" cy="310" r="${r}" fill="none" stroke="${theme.accent}" stroke-width="2" opacity="${opacity}"/>`;
            }
            
            // Base shapes (הצורות שהמשתמש מוסיף)
            baseShapes.forEach((shape, index) => {
                const color = themes[currentTheme].primary;
                const anim = animationLevel > 0 ? `animation: floatBase 3.2s ease-in-out infinite ${index * 0.3}s;` : '';
                elements += `
                <g transform="translate(${shape.x} ${shape.y}) rotate(${shape.rotation}) scale(${shape.scale})" style="${anim}" opacity="0.9">
                    <path d="${getBaseShapePath(shape.type)}" fill="${color}" stroke="#0a0a0f" stroke-width="6" filter="url(#glow)"/>
                </g>`;
            });
            
            svg.innerHTML = elements;
            currentSVGCode = `<svg width="620" height="620" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">${elements}</svg>`;
            
            if (!keepAnimation) addToHistory(currentSVGCode);
            
            if (animationLevel > 0) injectAnimationStyles();
        }

        function injectAnimationStyles() {
            let style = document.getElementById('dynamic-anim');
            if (!style) {
                style = document.createElement('style');
                style.id = 'dynamic-anim';
                document.head.appendChild(style);
            }
            
            let css = '';
            for (let i = 0; i < 3; i++) {
                const amp = animationLevel === 1 ? (12 + i*4) : (22 + i*9);
                css += `@keyframes float${i} {
                    0%, 100% { transform: translate(0, 0) rotate(0deg); }
                    50% { transform: translate(${amp}px, -${amp*0.7}px) rotate(8deg); }
                }`;
            }
            css += `@keyframes floatBase {
                0%, 100% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(8px, -12px) rotate(6deg); }
            }`;
            style.innerHTML = css;
        }

        function updateAnimation() {
            currentSpeed = parseFloat(document.getElementById('speed').value);
            document.getElementById('val-speed').textContent = currentSpeed.toFixed(1);
            generateSVG(true);
        }

        function toggleAnimation(level) {
            animationLevel = level;
            const toggles = document.querySelectorAll('.toggle-btn');
            toggles.forEach((el, i) => {
                el.classList.toggle('active', i === level);
            });
            generateSVG(true);
        }

        function addBaseShape(type) {
            const newShape = {
                type: type,
                x: 310,
                y: 310,
                rotation: randomBetween(-45, 45),
                scale: 0.9 + Math.random() * 0.6
            };
            baseShapes.push(newShape);
            generateSVG(true);
            
            // אוטומטי להסרה אחרי 8 שניות (אפשר לשנות)
            setTimeout(() => {
                const idx = baseShapes.indexOf(newShape);
                if (idx > -1) {
                    baseShapes.splice(idx, 1);
                    generateSVG(true);
                }
            }, 8000);
        }

        function addToHistory(svgCode) {
            historySVGs.unshift(svgCode);
            if (historySVGs.length > 8) historySVGs.pop();
            
            const container = document.getElementById('history');
            container.innerHTML = '';
            
            historySVGs.forEach((code, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = code.replace(/width="\d+" height="\d+"/g, 'width="68" height="68"');
                div.onclick = () => loadFromHistory(index);
                container.appendChild(div);
            });
        }

        function loadFromHistory(index) {
            baseShapes = []; // נקה צורות כשטוענים היסטוריה
            const svg = document.getElementById('main-svg');
            const fullCode = historySVGs[index];
            svg.innerHTML = fullCode.substring(fullCode.indexOf('>') + 1, fullCode.lastIndexOf('<'));
            currentSVGCode = fullCode;
        }

        function updateValue(slider) {
            const id = slider.id;
            let val = parseFloat(slider.value);
            if (id === 'rotate') val = Math.round(val);
            if (id === 'speed') val = val.toFixed(1);
            document.getElementById(`val-${id}`).textContent = val;
        }

        function randomizeAll() {
            baseShapes = [];
            const sliders = ['count', 'complexity', 'distort', 'rotate', 'speed'];
            sliders.forEach(id => {
                const slider = document.getElementById(id);
                const min = parseFloat(slider.min);
                const max = parseFloat(slider.max);
                slider.value = (Math.random() * (max - min) + min).toFixed(id === 'speed' ? 1 : 0);
                updateValue(slider);
            });
            currentTheme = randomBetween(0, 3);
            animationLevel = randomBetween(0, 2);
            const toggles = document.querySelectorAll('.toggle-btn');
            toggles.forEach((el, i) => el.classList.toggle('active', i === animationLevel));
            generateSVG();
        }

        function setTheme(n) {
            currentTheme = n;
            generateSVG(true);
        }

        function copySVG() {
            const cleanSVG = currentSVGCode || document.getElementById('main-svg').outerHTML;
            navigator.clipboard.writeText(cleanSVG).then(() => {
                const btns = document.querySelectorAll('button');
                const orig = btns[1].innerHTML;
                btns[1].innerHTML = '✅ הועתק!';
                setTimeout(() => btns[1].innerHTML = orig, 1600);
            });
        }

        function downloadSVG() {
            let svgContent = currentSVGCode || document.getElementById('main-svg').outerHTML;
            if (!svgContent.startsWith('<svg')) svgContent = `<svg width="620" height="620" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">${svgContent}</svg>`;
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `svg-flow-${Date.now()}.svg`;
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = () => {
            setTimeout(() => {
                generateSVG();
                setTimeout(() => {
                    randomizeAll();
                }, 420);
            }, 100);
        };
    </script>
</body>
</html>
