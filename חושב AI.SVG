<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Animated AI robot thinking">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9e3f2"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59c7ff"/>
      <stop offset="100%" stop-color="#1b8fff"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06244b"/>
      <stop offset="100%" stop-color="#02152f"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.61 0 0 0 0 0.92 0 0 0 0.25 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .outline{stroke:#0d2d59;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#486b99;stroke-width:4;stroke-linecap:round;fill:none}
      .bob {
        animation: bob 2.8s ease-in-out infinite;
        transform-origin: 256px 255px;
      }
      .shadowAnim { animation: shadowPulse 2.8s ease-in-out infinite; transform-origin: 256px 430px; }
      .pupils { animation: look 4.4s ease-in-out infinite; }
      .armL { animation: armFloatL 2.8s ease-in-out infinite; transform-origin: 155px 310px; }
      .armR { animation: armFloatR 2.8s ease-in-out infinite; transform-origin: 357px 310px; }
      .linesL { animation: linePulse 1.6s ease-in-out infinite; }
      .linesR { animation: linePulse 1.6s ease-in-out .25s infinite; }
      @keyframes bob {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes shadowPulse {
        0%,100% { transform: scaleX(1) scaleY(1); opacity:.26; }
        50% { transform: scaleX(.85) scaleY(.78); opacity:.18; }
      }
      @keyframes look {
        0%,12% { transform: translateX(0px); }
        18%,34% { transform: translateX(12px); }
        40%,58% { transform: translateX(-12px); }
        64%,78% { transform: translateX(10px); }
        84%,100% { transform: translateX(0px); }
      }
      @keyframes armFloatL {
        0%,100% { transform: rotate(0deg) translateY(0px); }
        50% { transform: rotate(4deg) translateY(-4px); }
      }
      @keyframes armFloatR {
        0%,100% { transform: rotate(0deg) translateY(0px); }
        50% { transform: rotate(-4deg) translateY(-4px); }
      }
      @keyframes linePulse {
        0%,100% { opacity:.45; }
        50% { opacity:1; }
      }
    </style>
  </defs>

  <ellipse class="shadowAnim" cx="256" cy="430" rx="88" ry="18" fill="#6ca7ee" opacity=".25" filter="url(#shadow)"/>

  <g class="bob">
    <!-- motion lines -->
    <g class="linesL thin" opacity=".7">
      <path d="M86 170c-8 10-8 24 0 34"/>
      <path d="M104 160c-10 14-10 38 0 52"/>
      <path d="M96 318c-8 12-8 29 0 41"/>
      <path d="M116 308c-11 16-11 41 0 57"/>
    </g>
    <g class="linesR thin" opacity=".7">
      <path d="M426 170c8 10 8 24 0 34"/>
      <path d="M408 160c10 14 10 38 0 52"/>
      <path d="M426 318c8 12 8 29 0 41"/>
      <path d="M406 308c11 16 11 41 0 57"/>
    </g>

    <!-- antenna -->
    <line x1="256" y1="84" x2="256" y2="48" class="outline"/>
    <circle cx="256" cy="34" r="14" fill="url(#blueGrad)" class="outline"/>
    <circle cx="251" cy="29" r="4" fill="#ffffff" opacity=".9"/>

    <!-- head -->
    <g>
      <rect x="120" y="82" rx="84" ry="84" width="272" height="204" fill="url(#bodyGrad)" class="outline"/>
      <rect x="150" y="118" rx="50" ry="50" width="212" height="120" fill="url(#screenGrad)"/>
      <rect x="150" y="118" rx="50" ry="50" width="212" height="120" fill="none" class="outline"/>
      <path d="M165 132c30-22 143-26 176 0" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="10" stroke-linecap="round"/>

      <!-- ears -->
      <g>
        <ellipse cx="132" cy="176" rx="24" ry="40" fill="url(#bodyGrad)" class="outline"/>
        <ellipse cx="132" cy="176" rx="16" ry="28" fill="#10346a"/>
        <path d="M145 146c8 14 8 44 0 60" fill="none" stroke="#70ccff" stroke-width="6" stroke-linecap="round" opacity=".95"/>
      </g>
      <g>
        <ellipse cx="380" cy="176" rx="24" ry="40" fill="url(#bodyGrad)" class="outline"/>
        <ellipse cx="380" cy="176" rx="16" ry="28" fill="#10346a"/>
        <path d="M367 146c-8 14-8 44 0 60" fill="none" stroke="#70ccff" stroke-width="6" stroke-linecap="round" opacity=".95"/>
      </g>

      <!-- eyes -->
      <g>
        <ellipse cx="218" cy="178" rx="28" ry="38" fill="#38b9ff" opacity=".95"/>
        <ellipse cx="294" cy="178" rx="28" ry="38" fill="#38b9ff" opacity=".95"/>
        <g class="pupils">
          <circle cx="228" cy="178" r="10" fill="#ffffff"/>
          <circle cx="304" cy="178" r="10" fill="#ffffff"/>
        </g>
      </g>
    </g>

    <!-- neck -->
    <g>
      <ellipse cx="256" cy="276" rx="48" ry="20" fill="#08234a" class="outline"/>
      <path d="M219 268c23 8 52 8 74 0" fill="none" stroke="#21497e" stroke-width="5" stroke-linecap="round" opacity=".8"/>
    </g>

    <!-- body -->
    <g>
      <path d="M178 294c13-17 37-26 78-26s65 9 78 26l9 96c2 24-14 42-39 42H208c-25 0-41-18-39-42z" fill="url(#bodyGrad)" class="outline"/>
      <path d="M196 314c14 16 106 18 120 0" fill="none" stroke="#ffffff" stroke-opacity=".5" stroke-width="8" stroke-linecap="round"/>
      <path d="M204 430c8 18 38 28 52 28s44-10 52-28" fill="#d4ddeb" class="outline"/>
    </g>

    <!-- left arm -->
    <g class="armL">
      <path d="M177 310c-16 4-28 16-34 34" fill="none" class="outline"/>
      <rect x="123" y="326" width="46" height="96" rx="22" fill="url(#bodyGrad)" class="outline" transform="rotate(18 146 374)"/>
      <rect x="116" y="383" width="40" height="34" rx="16" fill="#16396e" class="outline" transform="rotate(18 136 400)"/>
      <path d="M116 408c-2 21 8 33 26 35 19 2 33-9 35-29" fill="url(#bodyGrad)" class="outline"/>
      <path d="M124 430c8 4 15 3 21-1" fill="none" class="outline"/>
      <path d="M143 434c8 3 15 1 20-4" fill="none" class="outline"/>
    </g>

    <!-- right arm -->
    <g class="armR">
      <path d="M335 310c16 4 28 16 34 34" fill="none" class="outline"/>
      <rect x="343" y="326" width="46" height="96" rx="22" fill="url(#bodyGrad)" class="outline" transform="rotate(-18 366 374)"/>
      <rect x="356" y="383" width="40" height="34" rx="16" fill="#16396e" class="outline" transform="rotate(-18 376 400)"/>
      <path d="M335 414c2 20 16 31 35 29 18-2 28-14 26-35" fill="url(#bodyGrad)" class="outline"/>
      <path d="M347 430c6 4 13 5 21 1" fill="none" class="outline"/>
      <path d="M329 430c5 5 12 7 20 4" fill="none" class="outline"/>
    </g>

    <!-- hover lines under body -->
    <g opacity=".95">
      <path d="M220 452c20 10 52 10 72 0" fill="none" stroke="#3fb2ff" stroke-width="5" stroke-linecap="round">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/>
      </path>
      <path d="M236 466c11 5 29 5 40 0" fill="none" stroke="#3fb2ff" stroke-width="5" stroke-linecap="round">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
